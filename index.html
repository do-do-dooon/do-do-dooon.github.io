<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dooon | Composer Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Background -->
  <div class="background"></div>

  <!-- Sidebar -->
  <nav class="sidebar">
    <ul>
      <li><a href="#dooon">dooon</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#discography">Discography</a></li>
      <li><a href="#text">Text</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="content">

    <!-- dooon / Works -->
    <section id="dooon" class="section fade-in">
      <h1>dooon</h1>
      <div class="grid">
        <!-- 001 - 050 -->
        <!-- 仮配置 -->
        <!-- 必要なら後で audio / link を入れる -->
        <!-- 50個 -->
        <!-- ↓ 自動生成ではなく明示的に書いています -->
        <div class="item">
        <img src="test_jacket.png" alt="work 001">
        </div>
        <div class="item">
        <img src="test_jacket.png" alt="work 002">
        </div>
        <div class="item">
        <img src="test_jacket.png" alt="work 003">
        </div>
        <div class="item">
        <img src="test_jacket.png" alt="work 004">
        </div>

        <div class="item">
        <img src="test_jacket.png" alt="work 005">
        </div>
        <div class="item">
        <img src="test_jacket.png" alt="work 006">
        </div>
        <div class="item">
        <img src="test_jacket.png" alt="work 007">
        </div>
        <div class="item">
        <img src="test_jacket.png" alt="work 008">
        </div>
    </section>

    <!-- About -->
    <section id="about" class="section fade-in">
      <h2>About</h2>
      <p>
        Composer / Arranger.  
        音楽と空間、映像との関係性を意識した制作を行っています。
      </p>
    </section>

    <!-- Discography -->
    <section id="discography" class="section fade-in">
      <h2>Discography</h2>
      <div class="grid">
        <div class="item">Album 01</div>
        <div class="item">Album 02</div>
        <div class="item">Album 03</div>
      </div>
    </section>

    <!-- Text -->
    <section id="text" class="section fade-in">
      <h2>Text</h2>
      <p>
        制作に関する考えや、音楽についてのテキストを掲載します。
      </p>
    </section>

    <!-- Contact -->
    <section id="contact" class="section fade-in">
      <h2>Contact</h2>
      <p>
        <a href="mailto:example@example.com">example@example.com</a>
      </p>
    </section>

  </main>

  <!-- Scroll Fade -->
  <script>
    const targets = document.querySelectorAll('.fade-in');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.15 });

    targets.forEach(target => observer.observe(target));
  </script>

</body>
</html>
